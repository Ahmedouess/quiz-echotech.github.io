<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>EcoTech Museum - Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game-container">
    <div class="game-header">
        <h1>EcoTech Museum</h1>
        <div class="target-score">🏆 Premier à 9 points remporte la partie ! 🏆</div>
    </div>

    <!-- Mode Selector -->
    <div class="mode-selector" id="modeSelector">
        <div style="font-size: 1.1rem; margin-bottom: 10px;">📱 Choisissez votre rôle</div>
        <div class="mode-buttons">
            <button id="adminModeBtn" class="mode-btn admin">👑 Mode Admin</button>
            <button id="playerModeBtn" class="mode-btn player">🎮 Mode Joueur</button>
        </div>
        <div id="adminAccess" style="margin-top: 20px; display: none; display: flex; justify-content: center; align-items: center; gap: 10px;">
            <input type="password" id="adminCode" class="code-input" placeholder="Code d'accès admin" style="padding: 10px 20px; border-radius: 40px; border: 2px solid #00bcd4; background: rgba(20,20,35,0.9); color: white; text-align: center;">
            <button id="verifyAdminBtn" style="padding: 10px 25px; border-radius: 40px; background: linear-gradient(135deg, #00bcd4, #0097a7); color: white; border: none; cursor: pointer;">✅ Vérifier</button>
        </div>
    </div>

    <!-- Admin Panel -->
    <div id="adminPanel" style="display: none;">
        <div class="admin-badge">👑 VOUS ÊTES ADMIN</div>
        
        <!-- Teams List -->
        <div id="teamsGrid" class="teams-grid"></div>

        <!-- Admin Controls -->
        <div class="roulette-section">
            <div class="current-team-display" id="currentTeamDisplay">
                <div class="current-team-label">🎲 Équipe qui va jouer</div>
                <div class="current-team-name" id="currentTeamName">---</div>
            </div>
            <button id="drawTeamBtn" class="draw-btn">🎲 Tirer l'équipe</button>

            <div id="difficultySelector" style="display: none;">
                <div class="difficulty-section">
                    <button class="difficulty-btn easy" data-diff="easy">🍃 Facile (1 pt)</button>
                    <button class="difficulty-btn medium" data-diff="medium">⚡ Moyen (2 pts)</button>
                    <button class="difficulty-btn hard" data-diff="hard">🔥 Difficile (3 pts)</button>
                </div>
            </div>
        </div>
        
        <button id="resetGameAdminBtn" class="reset-game-btn" style="background:#f44336;">🔄 Réinitialiser le jeu</button>
    </div>

    <!-- Player Panel -->
    <div id="playerPanel" style="display: none;">
        <div class="player-badge">🎮 VOUS ÊTES JOUEUR</div>
        
        <div id="playerRegistration" class="player-registration">
            <h2>✨ Créez votre équipe ✨</h2>
            <input type="text" id="playerTeamName" class="team-name-input-player" placeholder="Nom de votre équipe (ex: Les Verts)">
            <br>
            <button id="joinGameBtn" class="join-btn">🎯 Rejoindre la partie</button>
        </div>
        
        <div id="playerGameInfo" style="display: none;">
            <div id="teamsGridPlayer" class="teams-grid"></div>
            <div id="playerWaitingMessage" class="waiting-message">
                ⏳ En attente...
            </div>
        </div>
    </div>
</div>

<!-- Modal Popup for answering questions -->
<div id="questionModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <div style="font-size: 0.9rem; color: #666;">🎯 Question pour</div>
            <div class="modal-team-name" id="modalTeamName">---</div>
            <div class="modal-points" id="modalPoints">1 point</div>
        </div>
        <div class="modal-question" id="modalQuestion"></div>
        <div class="modal-options" id="modalOptions"></div>
        <div id="modalFeedback"></div>
        <button id="modalCloseBtn" class="modal-close-btn" style="display: none;">Fermer</button>
    </div>
</div>

<!-- Firebase SDK -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getFirestore, doc, onSnapshot, setDoc, updateDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-analytics.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyBlabnOo9e6BlMV7Yx03MawUIu1p7yqE3s",
        authDomain: "ecotech-museum-quiz.firebaseapp.com",
        projectId: "ecotech-museum-quiz",
        storageBucket: "ecotech-museum-quiz.firebasestorage.app",
        messagingSenderId: "362621422445",
        appId: "1:362621422445:web:efbeb0b34df79e7ee1e864",
        measurementId: "G-VS4D0CNQJM"
    };
    
    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const db = getFirestore(app);
    
    // Make Firebase available globally for gameLogic.js
    window.db = db;
    window.doc = doc;
    window.setDoc = setDoc;
    window.updateDoc = updateDoc;
    window.onSnapshot = onSnapshot;
    window.collection = collection;
    window.query = query;
    window.where = where;
    window.getDocs = getDocs;
    
    // Load game logic after Firebase is ready
    const script = document.createElement('script');
    script.src = 'gameLogic.js';
    document.body.appendChild(script);
</script>

</body>
</html>
