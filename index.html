<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>EcoTech Museum - Jeu Quiz Challenge ODD</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            background: linear-gradient(135deg, #0a2f1f 0%, #1a4d2a 50%, #0d3b1f 100%);
            min-height: 100vh;
            padding: 40px 20px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(80, 200, 120, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(80, 200, 120, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .game-container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .game-header {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 32px;
            padding: 20px 30px;
            margin-bottom: 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border-bottom: 4px solid #4caf50;
        }

        .game-header h1 {
            background: linear-gradient(135deg, #0a2f1f, #4caf50);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 2rem;
        }

        .target-score {
            font-size: 1.1rem;
            color: #1b5e3f;
            margin-top: 8px;
            font-weight: bold;
        }

        /* Configuration panel */
        .config-panel {
            background: white;
            border-radius: 28px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .config-header {
            font-size: 1.3rem;
            font-weight: bold;
            color: #1b5e3f;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .teams-config {
            margin-bottom: 25px;
        }

        .teams-list-config {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 15px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .team-config-row {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #f0faf0;
            padding: 10px 15px;
            border-radius: 60px;
        }

        .team-config-row .team-emoji {
            font-size: 1.5rem;
        }

        .team-config-row input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 10px;
            font-size: 1rem;
            font-weight: 500;
            outline: none;
            color: #1b5e3f;
        }

        .team-config-row input::placeholder {
            color: #bbb;
            font-weight: normal;
        }

        .remove-team-btn {
            background: #ffebee;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 5px 12px;
            border-radius: 30px;
            color: #f44336;
            transition: all 0.2s;
        }

        .remove-team-btn:hover {
            background: #f44336;
            color: white;
        }

        .add-team-btn {
            background: #e8f5e9;
            border: 2px dashed #4caf50;
            padding: 12px 20px;
            border-radius: 60px;
            width: 100%;
            font-size: 1rem;
            font-weight: bold;
            color: #4caf50;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }

        .add-team-btn:hover {
            background: #4caf50;
            color: white;
        }

        .start-game-btn {
            background: linear-gradient(135deg, #4caf50, #2e7d32);
            color: white;
            border: none;
            padding: 14px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
        }

        .start-game-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(76,175,80,0.4);
        }

        /* Game area */
        .game-area {
            display: none;
        }

        .game-area.active {
            display: block;
        }

        /* Teams grid */
        .teams-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .team-card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s;
            border: 3px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .team-card.current-turn {
            border-color: #ff9800;
            box-shadow: 0 0 0 3px rgba(255,152,0,0.3), 0 10px 25px rgba(0,0,0,0.1);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .team-card.winner {
            border-color: #ffd700;
            background: linear-gradient(135deg, #fff8e1, #fff);
        }

        .team-emoji-big {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .team-name-card {
            font-size: 1.3rem;
            font-weight: bold;
            color: #1b5e3f;
            margin-bottom: 10px;
            word-break: break-word;
        }

        .team-score {
            font-size: 2rem;
            font-weight: bold;
            color: #4caf50;
        }

        .team-score span {
            font-size: 0.9rem;
            color: #666;
        }

        /* Roulette section */
        .roulette-section {
            background: white;
            border-radius: 32px;
            padding: 30px;
            margin-bottom: 25px;
            text-align: center;
        }

        .current-team-display {
            background: linear-gradient(135deg, #1b5e3f, #0d3b1f);
            border-radius: 60px;
            padding: 20px;
            margin-bottom: 20px;
            min-height: 140px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .current-team-label {
            color: #a5d6a7;
            font-size: 0.9rem;
        }

        .current-team-name {
            font-size: 2rem;
            font-weight: bold;
            color: white;
            margin: 10px 0;
            word-break: break-word;
        }

        .shuffle-animation {
            animation: shuffle 0.3s ease-in-out;
        }

        @keyframes shuffle {
            0% { opacity: 0.3; transform: scale(0.95); letter-spacing: 0px; }
            50% { opacity: 1; transform: scale(1.05); letter-spacing: 5px; }
            100% { opacity: 1; transform: scale(1); letter-spacing: 0px; }
        }

        .draw-btn {
            background: #ff9800;
            color: white;
            border: none;
            padding: 18px 40px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(255,152,0,0.4);
        }

        .draw-btn:hover {
            transform: scale(1.05);
            background: #f57c00;
        }

        .draw-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Difficulty buttons */
        .difficulty-section {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .difficulty-btn {
            padding: 12px 28px;
            border: 2px solid;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
        }

        .difficulty-btn.easy {
            border-color: #4caf50;
            color: #4caf50;
        }
        .difficulty-btn.easy:hover, .difficulty-btn.easy.active {
            background: #4caf50;
            color: white;
        }

        .difficulty-btn.medium {
            border-color: #ff9800;
            color: #ff9800;
        }
        .difficulty-btn.medium:hover, .difficulty-btn.medium.active {
            background: #ff9800;
            color: white;
        }

        .difficulty-btn.hard {
            border-color: #f44336;
            color: #f44336;
        }
        .difficulty-btn.hard:hover, .difficulty-btn.hard.active {
            background: #f44336;
            color: white;
        }

        /* Modal Popup */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: white;
            border-radius: 48px;
            max-width: 700px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 35px;
            position: relative;
            animation: slideIn 0.4s ease;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        @keyframes slideIn {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e0f2e9;
        }

        .modal-team-name {
            font-size: 1.8rem;
            font-weight: bold;
            color: #1b5e3f;
            margin: 10px 0;
            word-break: break-word;
        }

        .modal-points {
            display: inline-block;
            background: #4caf50;
            color: white;
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 0.9rem;
        }

        .modal-question {
            font-size: 1.4rem;
            font-weight: bold;
            color: #0a2f1f;
            margin: 25px 0;
            line-height: 1.3;
        }

        .modal-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .modal-option {
            background: #f9fff9;
            border: 2px solid #c8e6d9;
            border-radius: 20px;
            padding: 15px 20px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .modal-option:hover {
            background: #e8f5e9;
            transform: translateX(8px);
            border-color: #4caf50;
        }

        .modal-option.correct {
            background: #c8e6d9;
            border-color: #2e7d32;
        }

        .modal-option.wrong {
            background: #ffebee;
            border-color: #f44336;
        }

        .modal-feedback {
            background: #e8f5e9;
            border-left: 5px solid #4caf50;
            padding: 15px;
            border-radius: 16px;
            margin: 15px 0;
        }

        .modal-close-btn {
            background: #4caf50;
            color: white;
            border: none;
            padding: 14px 25px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .modal-close-btn:hover {
            background: #2e7d32;
            transform: scale(1.02);
        }

        .winner-message {
            text-align: center;
            padding: 30px;
            background: linear-gradient(135deg, #fff8e1, #fff3e0);
            border-radius: 28px;
            margin-top: 20px;
        }

        .reset-game-btn {
            background: #2196f3;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 40px;
            cursor: pointer;
            margin-top: 15px;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            body {
                padding: 20px 15px;
            }
            .teams-grid { 
                grid-template-columns: 1fr; 
            }
            .modal-content { 
                padding: 25px;
                width: 95%;
            }
            .modal-question { 
                font-size: 1.1rem; 
            }
            .game-header h1 {
                font-size: 1.4rem;
            }
            .current-team-name {
                font-size: 1.3rem;
            }
            .draw-btn {
                padding: 14px 25px;
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="game-header">
        <h1>🌍 EcoTech Museum ⚡ Challenge ODD</h1>
        <div class="target-score">🏆 Premier à 7 points remporte la partie ! 🏆</div>
    </div>

    <!-- Configuration Panel -->
    <div id="configPanel" class="config-panel">
        <div class="config-header">⚙️ Configuration du jeu</div>
        <div class="teams-config">
            <div style="margin-bottom: 10px; font-weight: bold; color: #1b5e3f;">👥 Équipes :</div>
            <div id="teamsListConfig" class="teams-list-config">
                <!-- Équipes ajoutées dynamiquement -->
            </div>
            <button id="addTeamBtn" class="add-team-btn">➕ Ajouter une équipe</button>
        </div>
        <button id="startGameBtn" class="start-game-btn">🎮 Lancer le jeu !</button>
    </div>

    <!-- Game Area -->
    <div id="gameArea" class="game-area">
        <div id="teamsGrid" class="teams-grid"></div>

        <div class="roulette-section">
            <div class="current-team-display" id="currentTeamDisplay">
                <div class="current-team-label">🎲 Équipe qui va jouer</div>
                <div class="current-team-name" id="currentTeamName">---</div>
            </div>
            <button id="drawTeamBtn" class="draw-btn">🎲 Tirer l'équipe</button>

            <div id="difficultySelector" style="display: none;">
                <div class="difficulty-section">
                    <button class="difficulty-btn easy" data-diff="easy">🍃 Facile (1 pt)</button>
                    <button class="difficulty-btn medium" data-diff="medium">⚡ Moyen (2 pts)</button>
                    <button class="difficulty-btn hard" data-diff="hard">🔥 Difficile (3 pts)</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal Popup -->
<div id="questionModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <div style="font-size: 0.9rem; color: #666;">🎯 Question pour</div>
            <div class="modal-team-name" id="modalTeamName">---</div>
            <div class="modal-points" id="modalPoints">1 point</div>
        </div>
        <div class="modal-question" id="modalQuestion"></div>
        <div class="modal-options" id="modalOptions"></div>
        <div id="modalFeedback"></div>
        <button id="modalCloseBtn" class="modal-close-btn" style="display: none;">Fermer</button>
    </div>
</div>

<script>
    // ============ BASE DE QUESTIONS ============
    const QUESTIONS_DB = {
        easy: [
            { text: "Quelle est la principale source d'énergie renouvelable la plus utilisée dans le monde ?", options: ["Solaire", "Éolien", "Hydraulique", "Géothermie"], correct: 2, explanation: "💧 L'hydroélectricité représente encore près de 16% de l'électricité mondiale." },
            { text: "Quel ODD vise spécifiquement l'énergie propre et abordable ?", options: ["ODD 7", "ODD 13", "ODD 11", "ODD 6"], correct: 0, explanation: "🎯 L'ODD 7 : Garantir l'accès à une énergie abordable, fiable et durable." },
            { text: "Que signifie 'CO₂' ?", options: ["Monoxyde de carbone", "Dioxyde de carbone", "Carbone organique", "Gaz carbonique liquide"], correct: 1, explanation: "🌫️ Le dioxyde de carbone est le principal gaz à effet de serre." },
            { text: "Les panneaux solaires produisent de l'électricité à partir de ?", options: ["Chaleur", "Lumière", "Vent", "Eau"], correct: 1, explanation: "☀️ L'effet photovoltaïque convertit la lumière en électricité." },
            { text: "Quel est l'objectif de l'accord de Paris sur le climat ?", options: ["0°C", "+1,5°C", "+2,5°C", "+3°C"], correct: 1, explanation: "🌡️ Limiter le réchauffement à +1,5°C par rapport à l'ère pré-industrielle." },
            { text: "Quelle énergie renouvelable utilise le vent ?", options: ["Solaire", "Hydraulique", "Éolienne", "Géothermie"], correct: 2, explanation: "💨 Les éoliennes convertissent l'énergie cinétique du vent en électricité." }
        ],
        medium: [
            { text: "Quel pays est le plus grand producteur d'énergie solaire au monde ?", options: ["États-Unis", "Inde", "Chine", "Allemagne"], correct: 2, explanation: "🇨🇳 La Chine produit plus de 30% de l'énergie solaire mondiale." },
            { text: "Qu'est-ce qu'une 'ville éponge' ?", options: ["Ville qui flotte", "Ville qui absorbe l'eau de pluie", "Ville sous terre", "Ville recyclée"], correct: 1, explanation: "💧 Une ville conçue pour gérer les eaux pluviales et prévenir les inondations." },
            { text: "Quel pourcentage des émissions mondiales de CO₂ vient du secteur des bâtiments ?", options: ["10%", "20%", "40%", "60%"], correct: 2, explanation: "🏢 Les bâtiments (chauffage, clim, électricité) représentent environ 40%." },
            { text: "Qu'est-ce que le 'bilan carbone' ?", options: ["Prix du carbone", "Quantité de CO₂ émise", "Taxe écologique", "Forêt artificielle"], correct: 1, explanation: "📊 Mesure des émissions de gaz à effet de serre d'une activité." },
            { text: "Quel ODD correspond à 'Villes et communautés durables' ?", options: ["ODD 9", "ODD 11", "ODD 13", "ODD 15"], correct: 1, explanation: "🏙️ L'ODD 11 vise à rendre les villes inclusives et durables." },
            { text: "Qu'est-ce que l'agrivoltaïsme ?", options: ["Cultiver sous panneaux solaires", "Brûler des plantes", "Énergie nucléaire", "Barrage hydraulique"], correct: 0, explanation: "🌾 Combinaison d'agriculture et de production solaire sur une même parcelle." }
        ],
        hard: [
            { text: "En quelle année l'Accord de Paris a-t-il été signé ?", options: ["2012", "2015", "2018", "2020"], correct: 1, explanation: "📅 2015, lors de la COP21 à Paris." },
            { text: "Quelle est l'énergie renouvelable avec le meilleur rendement par m² ?", options: ["Solaire", "Éolien", "Géothermie", "Hydrolienne"], correct: 2, explanation: "🔥 La géothermie a un rendement très élevé, disponible 24h/24." },
            { text: "Que signifie 'Smart Grid' ?", options: ["Réseau électrique intelligent", "Grille de données", "Autoroute connectée", "Bâtiment autonome"], correct: 0, explanation: "⚡ Un réseau qui optimise production, stockage et consommation d'énergie." },
            { text: "Quel est le principal gaz à effet de serre émis par l'agriculture ?", options: ["CO₂", "Méthane", "Protoxyde d'azote", "CFC"], correct: 1, explanation: "🐄 Le méthane (CH₄) vient de l'élevage et du riziculture." },
            { text: "Quelle innovation permet de stocker l'énergie éolienne excédentaire ?", options: ["Batteries lithium", "Hydrogène vert", "Volants d'inertie", "Toutes ces réponses"], correct: 3, explanation: "🔋 Toutes ces technologies existent pour stocker l'énergie renouvelable." },
            { text: "Quel pourcentage de l'énergie mondiale vient des renouvelables en 2023 ?", options: ["15%", "30%", "45%", "60%"], correct: 1, explanation: "🌍 Environ 30% de l'électricité mondiale est renouvelable." },
            { text: "Qu'est-ce que la 'biophilie' en architecture ?", options: ["Bâtiment connecté", "Intégration de la nature", "Matériaux recyclés", "Toits végétalisés"], correct: 1, explanation: "🏗️ Design qui relie les humains à la nature pour le bien-être." }
        ]
    };

    let gameState = {
        teams: [],
        currentTeamIndex: null,
        currentDifficulty: null,
        currentQuestion: null,
        waitingForDraw: true,
        gameActive: true,
        usedQuestions: { easy: [], medium: [], hard: [] },
        winner: null
    };

    let teamEmojis = ["🌿", "💡", "🌱", "☀️", "♻️", "🔋", "🚲", "🏆", "🌸", "⭐", "🦋", "🍃"];

    // DOM Elements
    const configPanel = document.getElementById('configPanel');
    const gameAreaDiv = document.getElementById('gameArea');
    const teamsListConfigDiv = document.getElementById('teamsListConfig');
    const teamsGridDiv = document.getElementById('teamsGrid');
    const currentTeamDisplay = document.getElementById('currentTeamDisplay');
    const drawTeamBtn = document.getElementById('drawTeamBtn');
    const difficultySelector = document.getElementById('difficultySelector');
    const addTeamBtn = document.getElementById('addTeamBtn');
    
    // Modal elements
    const modal = document.getElementById('questionModal');
    const modalTeamName = document.getElementById('modalTeamName');
    const modalPoints = document.getElementById('modalPoints');
    const modalQuestion = document.getElementById('modalQuestion');
    const modalOptions = document.getElementById('modalOptions');
    const modalFeedback = document.getElementById('modalFeedback');
    const modalCloseBtn = document.getElementById('modalCloseBtn');

    // Initialisation avec 2 équipes vides
    let teamsConfig = [
        { emoji: "🌿", name: "" },
        { emoji: "💡", name: "" }
    ];

    function renderTeamConfigInputs() {
        let html = '';
        teamsConfig.forEach((team, index) => {
            html += `
                <div class="team-config-row" data-index="${index}">
                    <span class="team-emoji">${team.emoji}</span>
                    <input type="text" class="team-name-input" value="${escapeHtml(team.name)}" placeholder="Nom de l'équipe ${index+1}">
                    <button class="remove-team-btn" data-index="${index}">✖️</button>
                </div>
            `;
        });
        teamsListConfigDiv.innerHTML = html;
        
        // Attacher les événements
        document.querySelectorAll('.team-name-input').forEach((input, idx) => {
            input.addEventListener('change', (e) => {
                teamsConfig[idx].name = e.target.value;
            });
        });
        
        document.querySelectorAll('.remove-team-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const index = parseInt(btn.getAttribute('data-index'));
                if (teamsConfig.length > 2) {
                    teamsConfig.splice(index, 1);
                    renderTeamConfigInputs();
                } else {
                    alert("⚠️ Il faut au moins 2 équipes pour jouer !");
                }
            });
        });
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    addTeamBtn.addEventListener('click', () => {
        const newEmoji = teamEmojis[teamsConfig.length % teamEmojis.length];
        teamsConfig.push({ emoji: newEmoji, name: "" });
        renderTeamConfigInputs();
    });
    
    function startGame() {
        // Récupérer les noms des équipes et vérifier qu'ils sont remplis
        const teams = [];
        let hasEmptyName = false;
        
        for (let i = 0; i < teamsConfig.length; i++) {
            const input = document.querySelector(`.team-config-row[data-index="${i}"] .team-name-input`);
            let name = input ? input.value.trim() : teamsConfig[i].name;
            if (!name) {
                hasEmptyName = true;
                alert(`⚠️ Veuillez donner un nom à l'équipe ${i+1} !`);
                return;
            }
            teams.push({
                id: i,
                name: name,
                score: 0,
                emoji: teamsConfig[i].emoji
            });
        }
        
        if (teams.length < 2) {
            alert("Il faut au moins 2 équipes pour jouer !");
            return;
        }
        
        if (hasEmptyName) return;
        
        gameState = {
            teams: teams,
            currentTeamIndex: null,
            currentDifficulty: null,
            currentQuestion: null,
            waitingForDraw: true,
            gameActive: true,
            usedQuestions: { easy: [], medium: [], hard: [] },
            winner: null
        };
        
        // Afficher l'interface de jeu
        configPanel.style.display = 'none';
        gameAreaDiv.classList.add('active');
        
        renderTeamsGrid();
        resetGameUI();
    }
    
    function renderTeamsGrid() {
        let html = '';
        gameState.teams.forEach((team, idx) => {
            const isWinner = gameState.winner && gameState.winner.id === team.id;
            html += `
                <div class="team-card ${isWinner ? 'winner' : ''}" data-team-id="${team.id}">
                    <div class="team-emoji-big">${team.emoji}</div>
                    <div class="team-name-card">${escapeHtml(team.name)}</div>
                    <div class="team-score">${team.score} <span>points</span></div>
                </div>
            `;
        });
        teamsGridDiv.innerHTML = html;
        
        // Mettre en surbrillance l'équipe courante
        if (gameState.currentTeamIndex !== null && !gameState.winner) {
            const cards = document.querySelectorAll('.team-card');
            cards.forEach((card, i) => {
                if (i === gameState.currentTeamIndex) {
                    card.classList.add('current-turn');
                } else {
                    card.classList.remove('current-turn');
                }
            });
        }
    }
    
    function resetGameUI() {
        gameState.waitingForDraw = true;
        gameState.currentDifficulty = null;
        gameState.currentQuestion = null;
        difficultySelector.style.display = 'none';
        drawTeamBtn.disabled = false;
        currentTeamDisplay.innerHTML = `
            <div class="current-team-label">🎲 Équipe qui va jouer</div>
            <div class="current-team-name">---</div>
        `;
        drawTeamBtn.textContent = "🎲 Tirer l'équipe";
        renderTeamsGrid();
    }
    
    function getRandomTeam() {
        const availableTeams = gameState.teams.filter(t => t.score < 7);
        if (availableTeams.length === 0) return null;
        const randomIndex = Math.floor(Math.random() * availableTeams.length);
        return gameState.teams.findIndex(t => t.id === availableTeams[randomIndex].id);
    }
    
    async function drawTeamWithShuffle() {
        if (!gameState.gameActive) return;
        if (gameState.winner) {
            alert(`🏆 ${gameState.winner.name} a déjà gagné ! Reconfigurez pour une nouvelle partie.`);
            return;
        }
        
        // Désactiver le bouton pendant l'animation
        drawTeamBtn.disabled = true;
        
        const availableTeamsNames = gameState.teams
            .filter(t => t.score < 7)
            .map(t => ({ name: t.name, emoji: t.emoji }));
        
        if (availableTeamsNames.length === 0) {
            drawTeamBtn.disabled = false;
            return;
        }
        
        // Animation de shuffling des noms
        let shuffleCount = 0;
        const maxShuffles = 12;
        
        const shuffleInterval = setInterval(() => {
            const randomTeam = availableTeamsNames[Math.floor(Math.random() * availableTeamsNames.length)];
            currentTeamDisplay.innerHTML = `
                <div class="current-team-label">🎲 Tirage en cours...</div>
                <div class="current-team-name shuffle-animation">${randomTeam.emoji} ${randomTeam.name}</div>
            `;
            shuffleCount++;
            if (shuffleCount >= maxShuffles) {
                clearInterval(shuffleInterval);
                finalizeDraw();
            }
        }, 80);
        
        function finalizeDraw() {
            const newTeamIndex = getRandomTeam();
            if (newTeamIndex === null) {
                checkWinner();
                drawTeamBtn.disabled = false;
                currentTeamDisplay.innerHTML = `
                    <div class="current-team-label">🎲 Équipe qui va jouer</div>
                    <div class="current-team-name">---</div>
                `;
                return;
            }
            
            gameState.currentTeamIndex = newTeamIndex;
            gameState.waitingForDraw = false;
            gameState.currentDifficulty = null;
            
            const team = gameState.teams[newTeamIndex];
            currentTeamDisplay.innerHTML = `
                <div class="current-team-label">🎲 Équipe qui va jouer</div>
                <div class="current-team-name">${team.emoji} ${escapeHtml(team.name)}</div>
            `;
            
            difficultySelector.style.display = 'block';
            
            // Reset difficulty buttons active state
            document.querySelectorAll('.difficulty-btn').forEach(btn => btn.classList.remove('active'));
            
            renderTeamsGrid();
            drawTeamBtn.disabled = false;
            drawTeamBtn.textContent = "🎲 Tirer l'équipe";
        }
    }
    
    function getRandomQuestion(difficulty) {
        const questions = QUESTIONS_DB[difficulty];
        const used = gameState.usedQuestions[difficulty];
        const available = questions.filter((_, idx) => !used.includes(idx));
        
        if (available.length === 0) {
            // Reset used questions for this difficulty if we run out
            gameState.usedQuestions[difficulty] = [];
            return questions[Math.floor(Math.random() * questions.length)];
        }
        
        const randomAvailable = available[Math.floor(Math.random() * available.length)];
        const originalIndex = questions.findIndex(q => q === randomAvailable);
        gameState.usedQuestions[difficulty].push(originalIndex);
        return randomAvailable;
    }
    
    function selectDifficulty(difficulty, points) {
        if (gameState.waitingForDraw || gameState.currentDifficulty !== null) return;
        if (!gameState.gameActive) return;
        
        gameState.currentDifficulty = difficulty;
        
        // Get random question
        const question = getRandomQuestion(difficulty);
        gameState.currentQuestion = { ...question, points };
        
        // Afficher le modal
        showModal(question, points);
    }
    
    function showModal(question, points) {
        const team = gameState.teams[gameState.currentTeamIndex];
        modalTeamName.textContent = `${team.emoji} ${team.name}`;
        modalPoints.textContent = `${points} point${points > 1 ? 's' : ''}`;
        modalQuestion.textContent = question.text;
        
        // Générer les options
        let optionsHtml = '';
        question.options.forEach((opt, idx) => {
            const letter = String.fromCharCode(65+idx);
            optionsHtml += `
                <div class="modal-option" data-opt-index="${idx}">
                    <strong>${letter}.</strong> ${opt}
                </div>
            `;
        });
        modalOptions.innerHTML = optionsHtml;
        modalFeedback.innerHTML = '';
        modalCloseBtn.style.display = 'none';
        
        // Attacher les événements aux options
        document.querySelectorAll('.modal-option').forEach(opt => {
            opt.addEventListener('click', () => handleAnswerInModal(parseInt(opt.getAttribute('data-opt-index'))));
        });
        
        modal.style.display = 'flex';
    }
    
    function handleAnswerInModal(selectedIdx) {
        if (!gameState.currentQuestion) return;
        
        const isCorrect = (selectedIdx === gameState.currentQuestion.correct);
        const points = gameState.currentQuestion.points;
        const team = gameState.teams[gameState.currentTeamIndex];
        
        // Désactiver les options
        const options = document.querySelectorAll('.modal-option');
        options.forEach(opt => {
            opt.style.pointerEvents = 'none';
        });
        
        // Highlight correct/wrong
        options.forEach((opt, idx) => {
            if (idx === gameState.currentQuestion.correct) {
                opt.classList.add('correct');
            }
            if (idx === selectedIdx && idx !== gameState.currentQuestion.correct) {
                opt.classList.add('wrong');
            }
        });
        
        if (isCorrect) {
            team.score += points;
            renderTeamsGrid();
            
            modalFeedback.innerHTML = `
                <div class="modal-feedback">
                    ✅ BRAVO ! +${points} point${points > 1 ? 's' : ''} pour ${escapeHtml(team.name)}<br>
                    📚 ${gameState.currentQuestion.explanation}
                </div>
            `;
        } else {
            const correctAnswer = gameState.currentQuestion.options[gameState.currentQuestion.correct];
            modalFeedback.innerHTML = `
                <div class="modal-feedback">
                    ❌ Dommage ! La bonne réponse était : "${correctAnswer}"<br>
                    📚 ${gameState.currentQuestion.explanation}<br>
                    <span style="color:#ff9800;">0 point pour cette question</span>
                </div>
            `;
        }
        
        modalCloseBtn.style.display = 'block';
        
        modalCloseBtn.onclick = () => {
            modal.style.display = 'none';
            checkWinner();
            if (!gameState.winner) {
                nextTurn();
            }
        };
    }
    
    function checkWinner() {
        for (let team of gameState.teams) {
            if (team.score >= 7) {
                gameState.winner = team;
                gameState.gameActive = false;
                showWinner(team);
                return true;
            }
        }
        return false;
    }
    
    function showWinner(team) {
        // Cacher le modal s'il est ouvert
        modal.style.display = 'none';
        
        // Afficher le gagnant dans la zone de jeu
        const rouletteSection = document.querySelector('.roulette-section');
        const originalContent = rouletteSection.innerHTML;
        rouletteSection.innerHTML = `
            <div class="winner-message">
                <div style="font-size:4rem;">🏆🎉🏆</div>
                <h2 style="color:#1b5e3f;">${team.emoji} ${escapeHtml(team.name)} a gagné !</h2>
                <p style="font-size:1.2rem; margin:15px 0;">Avec ${team.score} points, cette équipe maîtrise les enjeux des ODD !</p>
                <p>🌍 La technologie + l'écologie peuvent sauver notre planète. Bravo à tous !</p>
                <button id="resetGameBtn" class="reset-game-btn">🔄 Nouvelle partie</button>
            </div>
        `;
        
        drawTeamBtn.disabled = true;
        difficultySelector.style.display = 'none';
        
        document.getElementById('resetGameBtn').addEventListener('click', () => {
            location.reload();
        });
    }
    
    function nextTurn() {
        gameState.currentTeamIndex = null;
        gameState.currentDifficulty = null;
        gameState.currentQuestion = null;
        gameState.waitingForDraw = true;
        difficultySelector.style.display = 'none';
        drawTeamBtn.disabled = false;
        currentTeamDisplay.innerHTML = `
            <div class="current-team-label">🎲 Équipe qui va jouer</div>
            <div class="current-team-name">---</div>
        `;
        renderTeamsGrid();
    }
    
    // Event listeners for difficulty
    document.querySelectorAll('.difficulty-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            const diff = btn.getAttribute('data-diff');
            let points = diff === 'easy' ? 1 : (diff === 'medium' ? 2 : 3);
            selectDifficulty(diff, points);
            btn.classList.add('active');
        });
    });
    
    drawTeamBtn.addEventListener('click', drawTeamWithShuffle);
    document.getElementById('startGameBtn').addEventListener('click', startGame);
    
    // Fermer le modal si on clique en dehors
    window.addEventListener('click', (e) => {
        if (e.target === modal) {
            modal.style.display = 'none';
        }
    });
    
    // Initial render
    renderTeamConfigInputs();
</script>
</body>
</html>
